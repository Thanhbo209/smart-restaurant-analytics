name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/smart-restaurant-analytics

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: restaurant_analytics_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build & Run Tests
        run: mvn clean verify
        env:
          SPRING_PROFILES_ACTIVE: test
          POSTGRES_DB: restaurant_analytics_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST: localhost

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/smart-restaurant-analytics/target/surefire-reports/

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t restaurant-analytics:ci-${{ github.sha }} .
        working-directory: backend/smart-restaurant-analytics
